<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- 셀 크기 256x256, 안쪽 여백 36px, 글자 크기 158 -->
  <!-- ㅇ (좌상) -->
  <text x="130" y="148"
    font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif"
    font-size="158" font-weight="900"
    fill="white" text-anchor="middle" dominant-baseline="central">ㅇ</text>

  <!-- ㅃ (우상) -->
  <text x="382" y="148"
    font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif"
    font-size="158" font-weight="900"
    fill="white" text-anchor="middle" dominant-baseline="central">ㅃ</text>

  <!-- ㄸ (좌하) -->
  <text x="130" y="375"
    font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif"
    font-size="158" font-weight="900"
    fill="white" text-anchor="middle" dominant-baseline="central">ㄸ</text>

  <!-- ㄹ (우하) -->
  <text x="382" y="375"
    font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif"
    font-size="158" font-weight="900"
    fill="white" text-anchor="middle" dominant-baseline="central">ㄹ</text>
</svg>